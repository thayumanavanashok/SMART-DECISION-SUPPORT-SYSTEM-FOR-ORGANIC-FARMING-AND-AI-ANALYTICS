{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="grid grid-cols-1 gap-8">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Farm Data Input</h1>
            
            <form action="{{ url_for('index') }}" method="post" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Soil Type
                    </label>
                    <select
                        name="soilType"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                        required
                    >
                        <option value="">Select soil type</option>
                        <option value="clay">Clay</option>
                        <option value="sandy">Sandy</option>
                        <option value="loamy">Loamy</option>
                        <option value="silt">Silt</option>
                        <option value="peat">Peat</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Land Size (in acres)
                    </label>
                    <input
                        type="number"
                        name="landSize"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                        required
                        min="0"
                        step="0.1"
                    />
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Soil pH (Optional)
                        </label>
                        <input
                            type="number"
                            name="soilPH"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                            min="0"
                            max="14"
                            step="0.1"
                            placeholder="Example: 6.5"
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Key Nutrients (Optional)
                        </label>
                        <input
                            type="text"
                            name="nutrients"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="Example: Nitrogen medium, Potash low"
                        />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            State / UT
                        </label>
                        <select
                            id="stateSelect"
                            name="state"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                            required
                        >
                            <option value="">Loading states...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            District
                        </label>
                        <select
                            id="districtSelect"
                            name="district"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                            required
                            disabled
                        >
                            <option value="">Select state first</option>
                        </select>
                    </div>
                </div>

                <input type="hidden" id="locationInput" name="location" />

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Water Availability
                    </label>
                    <select
                        name="waterAvailability"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                        required
                    >
                        <option value="">Select water availability</option>
                        <option value="abundant">Abundant (Natural water sources)</option>
                        <option value="moderate">Moderate (Irrigation system)</option>
                        <option value="limited">Limited (Rainfall dependent)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Previous Crops
                    </label>
                    <textarea
                        name="previousCrops"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                        rows="3"
                        placeholder="List the crops you've grown in the last season"
                    ></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Current Issues (Optional)
                    </label>
                    <textarea
                        name="issues"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                        rows="3"
                        placeholder="Describe any current issues (pests, diseases, soil problems, etc.)"
                    ></textarea>
                </div>

                <button
                    type="submit"
                    class="w-full flex items-center justify-center space-x-2 bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition-colors"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    <span>Get Suggestions</span>
                </button>
            </form>
        </div>

    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function () {
    const stateSelect = document.getElementById('stateSelect');
    const districtSelect = document.getElementById('districtSelect');
    const locationInput = document.getElementById('locationInput');

    let states = [];

    function updateHiddenLocation() {
        const stateName = stateSelect.value;
        const districtName = districtSelect.value;

        if (stateName && districtName) {
            locationInput.value = `${districtName}, ${stateName}`;
        } else {
            locationInput.value = '';
        }
    }

    function renderDistricts(stateName) {
        const selectedState = states.find((item) => item.name === stateName);
        districtSelect.innerHTML = '';

        if (!selectedState || !selectedState.districts || selectedState.districts.length === 0) {
            districtSelect.disabled = true;
            districtSelect.innerHTML = '<option value="">No districts found</option>';
            updateHiddenLocation();
            return;
        }

        districtSelect.disabled = false;
        districtSelect.innerHTML = '<option value="">Select district</option>';

        selectedState.districts.forEach((district) => {
            const option = document.createElement('option');
            option.value = district.name;
            option.textContent = district.name;
            districtSelect.appendChild(option);
        });

        updateHiddenLocation();
    }

    stateSelect.addEventListener('change', function () {
        renderDistricts(stateSelect.value);
    });

    districtSelect.addEventListener('change', updateHiddenLocation);

    try {
        const response = await fetch('/api/india/states-districts');
        const payload = await response.json();

        if (!response.ok || !payload.states) {
            throw new Error(payload.error || 'Could not load states');
        }

        states = payload.states;
        stateSelect.innerHTML = '<option value="">Select state / UT</option>';

        states.forEach((state) => {
            const option = document.createElement('option');
            option.value = state.name;
            option.textContent = state.region_type === 'union_territory' ? `${state.name} (UT)` : state.name;
            stateSelect.appendChild(option);
        });
    } catch (error) {
        stateSelect.innerHTML = '<option value="">Could not load states</option>';
        districtSelect.innerHTML = '<option value="">Could not load districts</option>';
        console.error(error);
    }
});
</script>
{% endblock %}
